<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activeer je abonnement — Sollicitatie Coach</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f4f0;--card:#fff;--border:#e8e6e0;--border-hover:#b0aea8;--text:#1a1a18;--muted:#666;--faint:#999;--green-bg:#e8f5ee;--green:#1a7a4a;--red-bg:#fdf0f0;--red:#c0392b}
@media(prefers-color-scheme:dark){:root{--bg:#111110;--card:#1c1c1a;--border:#2e2e2b;--border-hover:#555;--text:#e8e6e0;--muted:#999;--faint:#666;--green-bg:#0d2b1a;--green:#4ade80;--red-bg:#2b0d0d;--red:#f87171}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;max-width:420px;width:100%;text-align:center}
.logo{font-size:14px;font-weight:700;color:var(--faint);margin-bottom:24px;text-decoration:none;display:block}
h1{font-size:22px;font-weight:700;margin-bottom:8px}
.sub{font-size:14px;color:var(--muted);margin-bottom:24px;line-height:1.6}
.steps{text-align:left;background:var(--bg);border-radius:10px;padding:16px;margin-bottom:24px}
.step{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px}
.step:last-child{margin-bottom:0}
.step-num{width:22px;height:22px;border-radius:50%;background:var(--text);color:var(--bg);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.step-text{font-size:13px;color:var(--muted);line-height:1.5}
label{display:block;font-size:11px;font-weight:700;color:var(--faint);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;text-align:left}
input{width:100%;border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:14px;font-family:inherit;color:var(--text);background:var(--bg);margin-bottom:12px;transition:border-color .15s}
input:focus{outline:none;border-color:var(--border-hover)}
input::placeholder{color:var(--faint)}
.btn{width:100%;padding:13px;background:var(--text);color:var(--bg);border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s;margin-bottom:10px}
.btn:hover:not(:disabled){opacity:.85}
.btn:disabled{opacity:.35;cursor:not-allowed}
.err{background:var(--red-bg);border:1px solid var(--red);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:12px;display:none;text-align:left}
.ok{background:var(--green-bg);border:1px solid var(--green);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--green);margin-bottom:12px;display:none;text-align:left}
.back{font-size:12px;color:var(--faint);text-decoration:none}
.back:hover{color:var(--muted)}
.lang-row{display:flex;gap:4px;justify-content:center;margin-bottom:20px}
.lang-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:3px 10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--muted)}
.lang-btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}
</style>
</head>
<body>
<div class="card">
  <a href="/" class="logo">Sollicitatie Coach</a>
  <div class="lang-row">
    <button class="lang-btn active" id="btn-nl" onclick="setLang('nl')">NL</button>
    <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
  </div>
  <h1 id="title">Activeer je abonnement</h1>
  <p class="sub" id="sub">Voer je e-mailadres en ordernummer in om Plus of Pro te activeren.</p>

  <div class="steps">
    <div class="step"><div class="step-num">1</div><div class="step-text" id="s1">Betaal via de checkout pagina</div></div>
    <div class="step"><div class="step-num">2</div><div class="step-text" id="s2">Check je e-mail voor de bevestiging van Lemon Squeezy</div></div>
    <div class="step"><div class="step-num">3</div><div class="step-text" id="s3">Kopieer je ordernummer (bijv. <strong>123456</strong>) en vul het hieronder in</div></div>
  </div>

  <label id="label-email">Jouw e-mailadres</label>
  <input type="email" id="email-input" placeholder="jouw@email.nl" />

  <label id="label-order">Ordernummer</label>
  <input type="text" id="order-input" placeholder="bijv. 123456" />

  <div class="err" id="err-box"></div>
  <div class="ok" id="ok-box"></div>

  <button class="btn" id="activate-btn" onclick="activate()">Activeer nu</button>
  <a href="/app.html" class="back" id="back-link">← Terug naar de app</a>
</div>

<script>
const T = {
  nl: {
    title: 'Activeer je abonnement',
    sub: 'Voer je e-mailadres en ordernummer in om Plus of Pro te activeren.',
    s1: 'Betaal via de checkout pagina',
    s2: 'Check je e-mail voor de bevestiging van Lemon Squeezy',
    s3: 'Kopieer je ordernummer (bijv. 123456) en vul het hieronder in',
    labelEmail: 'Jouw e-mailadres',
    labelOrder: 'Ordernummer',
    emailPlaceholder: 'jouw@email.nl',
    orderPlaceholder: 'bijv. 123456',
    btn: 'Activeer nu',
    back: '← Terug naar de app',
    errEmail: 'Voer een geldig e-mailadres in.',
    errOrder: 'Voer je ordernummer in.',
    errNotFound: 'Ordernummer niet gevonden of e-mailadres klopt niet. Controleer je bevestigingsmail.',
    errServer: 'Serverfout. Probeer opnieuw of mail naar joshuapole@live.nl',
    loading: 'Bezig met activeren...',
    okPlus: '✓ Plus geactiveerd! Je hebt 10 analyses per maand. Je wordt doorgestuurd...',
    okPro: '✓ Pro geactiveerd! Je hebt 100 analyses per maand + PDF export. Je wordt doorgestuurd...',
  },
  en: {
    title: 'Activate your subscription',
    sub: 'Enter your email and order number to activate Plus or Pro.',
    s1: 'Complete your purchase via the checkout page',
    s2: 'Check your email for the Lemon Squeezy confirmation',
    s3: 'Copy your order number (e.g. 123456) and enter it below',
    labelEmail: 'Your email address',
    labelOrder: 'Order number',
    emailPlaceholder: 'your@email.com',
    orderPlaceholder: 'e.g. 123456',
    btn: 'Activate now',
    back: '← Back to the app',
    errEmail: 'Please enter a valid email address.',
    errOrder: 'Please enter your order number.',
    errNotFound: 'Order number not found or email does not match. Check your confirmation email.',
    errServer: 'Server error. Please try again or email joshuapole@live.nl',
    loading: 'Activating...',
    okPlus: '✓ Plus activated! You have 10 analyses per month. Redirecting...',
    okPro: '✓ Pro activated! You have 100 analyses per month + PDF export. Redirecting...',
  }
};

let lang = localStorage.getItem('sol_lang') || 'nl';

function setLang(l) {
  lang = l;
  localStorage.setItem('sol_lang', l);
  document.getElementById('btn-nl').classList.toggle('active', l === 'nl');
  document.getElementById('btn-en').classList.toggle('active', l === 'en');
  applyLang();
}

function applyLang() {
  const t = T[lang];
  document.getElementById('title').textContent = t.title;
  document.getElementById('sub').textContent = t.sub;
  document.getElementById('s1').textContent = t.s1;
  document.getElementById('s2').textContent = t.s2;
  document.getElementById('s3').innerHTML = lang === 'nl'
    ? 'Kopieer je ordernummer (bijv. <strong>123456</strong>) en vul het hieronder in'
    : 'Copy your order number (e.g. <strong>123456</strong>) and enter it below';
  document.getElementById('label-email').textContent = t.labelEmail;
  document.getElementById('label-order').textContent = t.labelOrder;
  document.getElementById('email-input').placeholder = t.emailPlaceholder;
  document.getElementById('order-input').placeholder = t.orderPlaceholder;
  document.getElementById('activate-btn').textContent = t.btn;
  document.getElementById('back-link').textContent = t.back;
}

setLang(lang);

function showErr(msg) {
  const el = document.getElementById('err-box');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('ok-box').style.display = 'none';
}

function showOk(msg) {
  const el = document.getElementById('ok-box');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('err-box').style.display = 'none';
}

async function activate() {
  const t = T[lang];
  const email = document.getElementById('email-input').value.trim();
  const order = document.getElementById('order-input').value.trim().replace(/\s/g, '');

  document.getElementById('err-box').style.display = 'none';
  document.getElementById('ok-box').style.display = 'none';

  if (!email || !email.includes('@')) { showErr(t.errEmail); return; }
  if (!order) { showErr(t.errOrder); return; }

  const btn = document.getElementById('activate-btn');
  btn.disabled = true;
  btn.textContent = t.loading;

  try {
    const resp = await fetch('/api/activate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, order })
    });

    const data = await resp.json();

    if (!resp.ok) {
      if (resp.status === 404) { showErr(t.errNotFound); }
      else { showErr(t.errServer); }
      return;
    }

    const msg = data.tier === 'pro' ? t.okPro : t.okPlus;
    showOk(msg);

    localStorage.setItem('ls_session_id', data.sessionId);
    localStorage.setItem('sol_tier', data.tier);

    setTimeout(() => { window.location.href = '/app.html'; }, 2500);

  } catch (e) {
    showErr(t.errServer);
  } finally {
    btn.disabled = false;
    btn.textContent = t.btn;
  }
}

// Auto-fill order from URL if present
const p = new URLSearchParams(window.location.search);
if (p.get('order')) document.getElementById('order-input').value = p.get('order');
if (p.get('email')) document.getElementById('email-input').value = p.get('email');
</script>
</body>
</html>
<!-- Dit bestand is compleet klaar voor upload als activate.html -->
