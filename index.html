<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sollicitatie Coach — AI CV & Motivatiebrief Analyse</title>
<meta name="description" content="Analyseer je CV op een vacature met AI. Krijg een match score, verbeterpunten en een motivatiebrief op maat. Gratis proberen.">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f4f0;
  --card: #ffffff;
  --border: #e8e6e0;
  --border-hover: #b0aea8;
  --text: #1a1a18;
  --muted: #666;
  --faint: #999;
  --green-bg: #e8f5ee;
  --green: #1a7a4a;
  --red-bg: #fdf0f0;
  --red: #c0392b;
  --amber: #c07800;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #111110;
    --card: #1c1c1a;
    --border: #2e2e2b;
    --border-hover: #555;
    --text: #e8e6e0;
    --muted: #999;
    --faint: #666;
    --green-bg: #0d2b1a;
    --green: #4ade80;
    --red-bg: #2b0d0d;
    --red: #f87171;
    --amber: #fbbf24;
  }
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 16px; }
.app { max-width: 800px; margin: 0 auto; }

/* Header */
.header { text-align: center; padding: 36px 0 28px; }
.header h1 { font-size: 26px; font-weight: 700; margin-bottom: 8px; }
.header p { font-size: 15px; color: var(--muted); max-width: 480px; margin: 0 auto; line-height: 1.6; }
.badge { display: inline-block; background: var(--green-bg); color: var(--green); font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; margin-left: 8px; vertical-align: middle; }
.badge.pro { background: #fef3c7; color: #92400e; }

/* Usage bar */
.usage-bar { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
.dots { display: flex; gap: 5px; }
.dot { width: 10px; height: 10px; border-radius: 50%; transition: background 0.2s; }
.dot.used { background: var(--text); opacity: 0.35; }
.dot.avail { background: var(--border); border: 1px solid var(--border-hover); }
#usage-text { font-size: 13px; color: var(--muted); }
.upgrade-btn { margin-left: auto; background: var(--text); color: var(--bg); border: none; border-radius: 8px; padding: 7px 14px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; white-space: nowrap; transition: opacity 0.15s; }
.upgrade-btn:hover { opacity: 0.8; }

/* Inputs */
.inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
@media (max-width: 560px) { .inputs { grid-template-columns: 1fr; } }
.input-block label { display: block; font-size: 11px; font-weight: 700; color: var(--faint); margin-bottom: 6px; letter-spacing: 0.06em; text-transform: uppercase; }
textarea { width: 100%; height: 190px; border: 1px solid var(--border); border-radius: 12px; padding: 12px; font-size: 13px; font-family: inherit; color: var(--text); background: var(--card); resize: vertical; line-height: 1.6; transition: border-color 0.15s; }
textarea:focus { outline: none; border-color: var(--border-hover); }
textarea::placeholder { color: var(--faint); }

/* Buttons */
.analyse-btn { width: 100%; padding: 15px; background: var(--text); color: var(--bg); border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; transition: opacity 0.15s; }
.analyse-btn:hover:not(:disabled) { opacity: 0.85; }
.analyse-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* Loading */
.loading { text-align: center; padding: 48px 16px; }
.spinner { display: inline-block; width: 32px; height: 32px; border: 2.5px solid var(--border); border-top-color: var(--text); border-radius: 50%; animation: spin 0.75s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading p { margin-top: 16px; font-size: 14px; color: var(--muted); }

/* Error */
.error-box { background: var(--red-bg); border: 1px solid var(--red); border-radius: 12px; padding: 14px 16px; font-size: 13px; color: var(--red); margin-top: 16px; line-height: 1.6; }

/* Results */
.results { margin-top: 20px; display: flex; flex-direction: column; gap: 12px; }

.score-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; display: flex; align-items: center; gap: 20px; }
.score-ring { position: relative; width: 80px; height: 80px; flex-shrink: 0; }
.score-ring svg { transform: rotate(-90deg); }
.score-number { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; }
.score-info h3 { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
.score-info p { font-size: 13px; color: var(--muted); line-height: 1.6; }

.section { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.section-header { padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
.section-header:hover { background: var(--bg); }
.section-header h3 { font-size: 14px; font-weight: 700; }
.section-body { padding: 0 16px 16px; font-size: 13px; color: var(--muted); line-height: 1.7; }
.section-body.hidden { display: none; }
.chevron { font-size: 11px; color: var(--faint); transition: transform 0.2s; }
.chevron.up { transform: rotate(180deg); }

.tag-group-label { font-size: 11px; font-weight: 700; color: var(--faint); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 8px; }
.tag-group-label + .tag-group-label, .tag-row + .tag-group-label { margin-top: 14px; }
.tag-row { display: flex; flex-wrap: wrap; gap: 6px; }
.tag { padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.tag.match { background: var(--green-bg); color: var(--green); }
.tag.miss { background: var(--red-bg); color: var(--red); }

.bullet-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
.bullet-list li { padding: 6px 10px 6px 14px; border-radius: 0 6px 6px 0; font-size: 13px; }
.bullet-list li.good { border-left: 3px solid var(--green); background: var(--green-bg); color: var(--text); }
.bullet-list li.bad { border-left: 3px solid var(--red); background: var(--red-bg); color: var(--text); }

.copy-btn { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; font-size: 11px; font-weight: 700; color: var(--faint); cursor: pointer; font-family: inherit; transition: all 0.15s; }
.copy-btn:hover { border-color: var(--border-hover); color: var(--text); }

.motiv-text { white-space: pre-wrap; }

/* Paywall */
.paywall-wrap { position: relative; }
.paywall-blur { filter: blur(5px); pointer-events: none; user-select: none; }
.paywall-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
.paywall-box { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px 28px; text-align: center; }
.paywall-box p { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
.paywall-box small { font-size: 12px; color: var(--muted); display: block; margin-bottom: 14px; }
.paywall-box .cta { background: var(--text); color: var(--bg); border: none; border-radius: 8px; padding: 10px 20px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; transition: opacity 0.15s; }
.paywall-box .cta:hover { opacity: 0.8; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Sollicitatie Coach <span class="badge" id="tier-badge">GRATIS</span></h1>
    <p>Plak je CV en vacature — krijg een match score, verbeterpunten en een motivatiebrief op maat in 30 seconden.</p>
  </div>

  <div class="usage-bar">
    <div class="dots" id="dots"></div>
    <span id="usage-text"></span>
    <button class="upgrade-btn" onclick="goUpgrade()">Pro — €9,99/mnd</button>
  </div>

  <div class="inputs">
    <div class="input-block">
      <label>Jouw CV</label>
      <textarea id="cv-input" placeholder="Plak hier de tekst van je CV...&#10;&#10;Naam, werkervaring, opleiding, vaardigheden..."></textarea>
    </div>
    <div class="input-block">
      <label>Vacaturetekst</label>
      <textarea id="job-input" placeholder="Plak hier de volledige vacaturetekst...&#10;&#10;Functieomschrijving, vereisten, bedrijf..."></textarea>
    </div>
  </div>

  <button class="analyse-btn" id="analyse-btn" onclick="runAnalysis()">Analyseer mijn sollicitatie</button>
  <div id="results"></div>
</div>

<script>
const FREE_LIMIT = 3;
const STRIPE_PAYMENT_LINK = 'https://sollicitatie-coach.lemonsqueezy.com/checkout/buy/dfcb053f-66f7-4458-8cd4-d7d5e129f649';
const STRIPE_SESSION_KEY = 'stripe_session_id';

function getUses() { return parseInt(localStorage.getItem('sol_uses') || '0'); }
function getSession() { return localStorage.getItem(STRIPE_SESSION_KEY) || null; }

// VEILIG: isPro wordt alleen bepaald door de server (r.isPro), NOOIT door localStorage
// localStorage wordt alleen gebruikt voor de usage bar weergave, niet voor toegang
function usesLeft() { return Math.max(0, FREE_LIMIT - getUses()); }

function renderUsageBar(serverConfirmedPro) {
  const pro = !!serverConfirmedPro;
  const used = getUses();
  const left = usesLeft();

  document.getElementById('tier-badge').textContent = pro ? 'PRO' : 'GRATIS';
  document.getElementById('tier-badge').className = 'badge' + (pro ? ' pro' : '');

  const dotsEl = document.getElementById('dots');
  if (pro) {
    dotsEl.innerHTML = '<span style="font-size:12px;color:var(--green);font-weight:700">Ongelimiteerd</span>';
    document.getElementById('usage-text').textContent = 'Pro abonnement actief';
  } else {
    dotsEl.innerHTML = Array.from({length: FREE_LIMIT}, (_, i) =>
      `<div class="dot ${i < used ? 'used' : 'avail'}"></div>`
    ).join('');
    document.getElementById('usage-text').textContent =
      left > 0 ? `${left} van ${FREE_LIMIT} gratis analyses over` : 'Geen analyses meer — upgrade naar Pro';
  }
}

// Check Stripe session via URL (na redirect van Stripe)
const params = new URLSearchParams(window.location.search);
const sessionFromUrl = params.get('session_id');
if (sessionFromUrl) {
  localStorage.setItem(STRIPE_SESSION_KEY, sessionFromUrl);
  window.history.replaceState({}, '', window.location.pathname);
}

// Initieel renderen zonder Pro (server heeft nog niet bevestigd)
renderUsageBar(false);

function goUpgrade() {
  window.location.href = STRIPE_PAYMENT_LINK;
}

// Veilige fetch die altijd een object teruggeeft, ook bij HTML error responses
async function safeFetch(url, options) {
  const resp = await fetch(url, options);
  const contentType = resp.headers.get('content-type') || '';

  if (!contentType.includes('application/json')) {
    const text = await resp.text().catch(() => '');
    console.error('Non-JSON response van server:', resp.status, text.substring(0, 200));
    throw new Error(
      resp.status === 500 ? 'Serverfout (500). Controleer of de API key correct is ingesteld.' :
      resp.status === 404 ? 'API route niet gevonden (404). Controleer je deployment.' :
      resp.status === 503 ? 'Service tijdelijk niet beschikbaar. Probeer over een minuut opnieuw.' :
      `Onverwachte serverfout (${resp.status}). Probeer opnieuw.`
    );
  }

  const data = await resp.json();
  return { resp, data };
}

async function runAnalysis() {
  // Gebruik ALLEEN localStorage voor de client-side limiet check (niet voor Pro toegang)
  const session = getSession();
  const left = usesLeft();
  if (!session && left <= 0) { goUpgrade(); return; }

  const cv = document.getElementById('cv-input').value.trim();
  const job = document.getElementById('job-input').value.trim();
  if (cv.length < 30) { alert('Plak je CV in het linkerveld (minimaal een paar regels).'); return; }
  if (job.length < 30) { alert('Plak de vacaturetekst in het rechterveld (minimaal een paar regels).'); return; }

  document.getElementById('analyse-btn').disabled = true;
  document.getElementById('results').innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      <p>AI analyseert jouw match... even geduld</p>
    </div>`;

  try {
    const headers = { 'Content-Type': 'application/json' };
    if (session) headers['x-stripe-session'] = session;

    const { resp, data } = await safeFetch('/api/analyse', {
      method: 'POST',
      headers,
      body: JSON.stringify({ cv, job })
    });

    if (resp.status === 429) {
      document.getElementById('results').innerHTML = `
        <div class="error-box">
          Je hebt je 3 gratis analyses gebruikt. Upgrade naar Pro voor ongelimiteerde toegang.
          <br><br>
          <button onclick="goUpgrade()" style="background:var(--text);color:var(--bg);border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">Upgrade naar Pro</button>
        </div>`;
      return;
    }

    if (!resp.ok) {
      throw new Error(data.error || `Serverfout (${resp.status})`);
    }

    // VEILIG: alleen de server beslist of iemand Pro is
    const confirmedPro = !!data.isPro;

    if (!confirmedPro) {
      localStorage.setItem('sol_uses', getUses() + 1);
    }

    renderUsageBar(confirmedPro);
    renderResults(data);

  } catch (e) {
    document.getElementById('results').innerHTML =
      `<div class="error-box">${escHtml(e.message)}<br><br>
       <small style="opacity:0.7">Als dit blijft gebeuren, controleer dan of de server correct is geconfigureerd.</small></div>`;
  } finally {
    document.getElementById('analyse-btn').disabled = false;
  }
}

function scoreColor(s) {
  if (s >= 75) return 'var(--green)';
  if (s >= 50) return 'var(--amber)';
  return 'var(--red)';
}

function renderResults(r) {
  const color = scoreColor(r.score);
  const circ = 2 * Math.PI * 32;
  const offset = circ * (1 - r.score / 100);

  // VEILIG: motivatiebrief alleen tonen als SERVER bevestigt dat het Pro is
  // localStorage manipulation heeft hier GEEN effect meer
  const showMotiv = r.isPro === true;

  document.getElementById('results').innerHTML = `
  <div class="results">
    <div class="score-card">
      <div class="score-ring">
        <svg width="80" height="80" viewBox="0 0 80 80">
          <circle cx="40" cy="40" r="32" fill="none" stroke="var(--border)" stroke-width="5"/>
          <circle cx="40" cy="40" r="32" fill="none" stroke="${color}" stroke-width="5"
            stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}"
            stroke-linecap="round"/>
        </svg>
        <div class="score-number" style="color:${color}">${r.score}</div>
      </div>
      <div class="score-info">
        <h3>Match score: ${r.score}/100</h3>
        <p>${escHtml(r.score_uitleg)}</p>
      </div>
    </div>

    <div class="section">
      <div class="section-header" onclick="toggleSection(this)">
        <h3>Keywords</h3>
        <span class="chevron up">▼</span>
      </div>
      <div class="section-body">
        <div class="tag-group-label">Aanwezig in je CV</div>
        <div class="tag-row">${(r.match_keywords||[]).map(k=>`<span class="tag match">${escHtml(k)}</span>`).join('') || '<span style="color:var(--faint);font-size:13px">Geen gevonden</span>'}</div>
        <div class="tag-group-label">Ontbreekt nog</div>
        <div class="tag-row">${(r.mis_keywords||[]).map(k=>`<span class="tag miss">${escHtml(k)}</span>`).join('') || '<span style="color:var(--faint);font-size:13px">Geen</span>'}</div>
      </div>
    </div>

    <div class="section">
      <div class="section-header" onclick="toggleSection(this)">
        <h3>Sterke punten & verbeterpunten</h3>
        <span class="chevron up">▼</span>
      </div>
      <div class="section-body">
        <ul class="bullet-list">
          ${(r.sterke_punten||[]).map(p=>`<li class="good">${escHtml(p)}</li>`).join('')}
          ${(r.verbeterpunten||[]).map(p=>`<li class="bad">${escHtml(p)}</li>`).join('')}
        </ul>
      </div>
    </div>

    <div class="section">
      <div class="section-header" onclick="toggleSection(this)">
        <h3>Motivatiebrief op maat</h3>
        <div style="display:flex;gap:8px;align-items:center">
          ${showMotiv ? `<button class="copy-btn" onclick="event.stopPropagation();copyText('motiv-text')">Kopieer</button>` : ''}
          <span class="chevron up">▼</span>
        </div>
      </div>
      <div class="section-body">
        ${showMotiv
          ? `<p class="motiv-text" id="motiv-text">${escHtml(r.motivatiebrief)}</p>`
          : `<div class="paywall-wrap">
               <div class="paywall-blur motiv-text">${escHtml(r.motivatiebrief)}</div>
               <div class="paywall-overlay">
                 <div class="paywall-box">
                   <p>Motivatiebrief alleen voor Pro</p>
                   <small>Upgrade voor ongelimiteerde analyses + volledige brief</small>
                   <button class="cta" onclick="goUpgrade()">Pro — €9,99/mnd</button>
                 </div>
               </div>
             </div>`
        }
      </div>
    </div>

    <div class="section">
      <div class="section-header" onclick="toggleSection(this)">
        <h3>CV verbeterpunten</h3>
        <span class="chevron up">▼</span>
      </div>
      <div class="section-body">
        <p>${escHtml(r.cv_tips)}</p>
      </div>
    </div>
  </div>`;
}

function toggleSection(header) {
  const body = header.nextElementSibling;
  const chevron = header.querySelector('.chevron');
  const isOpen = !body.classList.contains('hidden');
  body.classList.toggle('hidden', isOpen);
  chevron.classList.toggle('up', !isOpen);
}

function copyText(id) {
  const el = document.getElementById(id);
  if (!el) return;
  navigator.clipboard.writeText(el.innerText).then(() => {
    const btn = document.querySelector(`button[onclick*="${id}"]`);
    if (btn) { btn.textContent = 'Gekopieerd!'; setTimeout(() => btn.textContent = 'Kopieer', 2000); }
  });
}

function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
</script>
</body>
</html>
