<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sollicitatie Coach — AI CV & Motivatiebrief Analyse</title>
<meta name="description" content="Analyseer je CV op een vacature met AI. Krijg een match score, verbeterpunten en een motivatiebrief op maat. Gratis proberen.">
<script defer src="/_vercel/insights/script.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
/* === AL JE CSS ONGEWIJZIGD === */
/* (ongewijzigd gelaten om ruimte te besparen) */
</style>
</head>

<body>
<div class="app">

<!-- ===== UI ONGEWIJZIGD ===== -->

</div>

<script>
'use strict';

const FREE_LIMIT = 3;
const PAYMENT_LINK_PRO  = 'https://sollicitatie-coach.lemonsqueezy.com/checkout/buy/7719f367-3c74-4f30-bd9e-323f3f66a382';
const PAYMENT_LINK_PLUS = 'https://sollicitatie-coach.lemonsqueezy.com/checkout/buy/18245f15-0847-400a-8688-cdf664bf9771';

const SESSION_KEY = 'ls_session_id';
const TIER_KEY = 'ls_tier'; // 🔥 FIX: NIEUW

let currentTier = localStorage.getItem(TIER_KEY) || 'free'; // 🔥 FIX
let currentCanPdf = false;
let currentMotivText = '';

// ===================== 🔥 FIX 1: SESSION + TIER SYNC =====================
const params = new URLSearchParams(window.location.search);

// LemonSqueezy redirect fix (belangrijk)
const sessionFromUrl = params.get('order') || params.get('session_id');

if (sessionFromUrl) {
  localStorage.setItem(SESSION_KEY, sessionFromUrl);

  // 🔥 FIX: markeer tijdelijk pending (voorkomt FREE flash)
  localStorage.setItem('ls_pending_sync', '1');

  window.history.replaceState({}, '', window.location.pathname);
}

// 🔥 FIX 2: restore tier direct bij load
const savedTier = localStorage.getItem(TIER_KEY);
if (savedTier) currentTier = savedTier;

// ===================== EXISTING CODE =====================
let lastResult = null;

// ===================== 🔥 FIX 3: FORCE TIER UPDATE =====================
function syncTier(data) {
  if (!data?.tier) return;

  currentTier = data.tier;

  // persist correct
  localStorage.setItem(TIER_KEY, currentTier);
  localStorage.setItem('ls_pending_sync', '0');

  if (data.sessionId) {
    localStorage.setItem(SESSION_KEY, data.sessionId);
  }
}

// ===================== RUN ANALYSIS =====================
async function runAnalysis() {
  const session = localStorage.getItem(SESSION_KEY);
  const usedLocally = parseInt(localStorage.getItem('sol_uses') || '0');

  if (!session && usedLocally >= FREE_LIMIT) {
    goUpgrade();
    return;
  }

  const cv = document.getElementById('cv-input').value.trim();
  const job = document.getElementById('job-input').value.trim();

  if (cv.length < 30) return alert('Plak CV');
  if (job.length < 30) return alert('Plak job');

  document.getElementById('analyse-btn').disabled = true;
  document.getElementById('results').innerHTML =
    `<div class="loading"><div class="spinner"></div><p>Loading...</p></div>`;

  try {
    const headers = { 'Content-Type': 'application/json' };
    if (session) headers['x-ls-session'] = session;

    const resp = await fetch('/api/analyse', {
      method: 'POST',
      headers,
      body: JSON.stringify({ cv, job })
    });

    const data = await resp.json();

    if (!resp.ok) throw new Error(data.error || 'Error');

    // ===================== 🔥 FIX 4: FORCE TIER SYNC =====================
    syncTier(data);

    if (currentTier === 'free') {
      localStorage.setItem('sol_uses', usedLocally + 1);
    }

    lastResult = data;
    renderResults(data);

  } catch (e) {
    document.getElementById('results').innerHTML =
      `<div class="error-box">${e.message}</div>`;
  } finally {
    document.getElementById('analyse-btn').disabled = false;
  }
}

// ===================== NAV =====================
function goUpgrade() {
  window.location.href = PAYMENT_LINK_PRO;
}
function goPlus() {
  window.location.href = PAYMENT_LINK_PLUS;
}

// ===================== USAGE BAR FIX =====================
function renderUsageBar() {
  const badge = document.getElementById('tier-badge');

  if (currentTier === 'pro') {
    badge.textContent = 'PRO';
    badge.className = 'badge pro';
  } else if (currentTier === 'plus') {
    badge.textContent = 'PLUS';
    badge.className = 'badge plus';
  } else {
    badge.textContent = 'FREE';
    badge.className = 'badge';
  }
}

// ===================== INIT FIX =====================
function init() {
  renderUsageBar();

  // 🔥 FIX: auto-correct FREE bug na redirect
  const pending = localStorage.getItem('ls_pending_sync');
  if (pending === '1' && localStorage.getItem(SESSION_KEY)) {
    // keep state stable for a moment
    setTimeout(() => {
      const tier = localStorage.getItem(TIER_KEY);
      if (tier && tier !== 'free') {
        currentTier = tier;
        renderUsageBar();
      }
    }, 500);
  }
}

init();

</script>

</body>
</html>
